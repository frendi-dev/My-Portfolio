<!DOCTYPE html>
<html>
<head>
    <title>Frendi Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#1e293b;
            width:350px;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            animation:fade 1s ease;
        }

        @keyframes fade{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        img{
            width:120px;
            height:120px;
            border-radius:50%;
            border:4px solid #38bdf8;
            margin-bottom:15px;
        }

        h1{
            color:#38bdf8;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:20px;
        }

        .skill{
            background:#334155;
            padding:10px;
            margin:10px 0;
            border-radius:10px;
            transition:0.3s;
        }

        .skill:hover{
            background:#38bdf8;
            transform:scale(1.05);
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#38bdf8;
            color:black;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:white;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

    <div class="card">

        <img src="https://i.imgur.com/2DhmtJ4.png">

        <h1>Halo, Saya Frendi 👋</h1>

        <p>
            Freelance Developer | Learning AI & Web Development
        </p>

        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">JavaScript</div>
        <div class="skill">GitHub</div>

        <a class="btn" href="https://github.com/frendi-dev">
            GitHub Saya
        </a>

    </div>

</body>
</html>
