<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Frendi AI Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050816;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
overflow:hidden;
}

.bg{
position:absolute;
width:500px;
height:500px;
background:cyan;
filter:blur(180px);
opacity:0.15;
border-radius:50%;
top:-100px;
left:-100px;
}

.container{
position:relative;
width:100%;
max-width:500px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:25px;
padding:30px;
box-shadow:0 0 30px rgba(0,255,255,0.2);
z-index:1;
}

.profile{
text-align:center;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid cyan;
box-shadow:0 0 25px cyan;
object-fit:cover;
}

.profile h1{
margin-top:20px;
font-size:35px;
}

.profile span{
color:cyan;
}

.profile p{
margin-top:10px;
color:#bbb;
font-size:14px;
line-height:1.6;
}

.skills{
margin-top:30px;
}

.skill{
background:#1e293b;
padding:15px;
margin-top:15px;
border-radius:12px;
}

.chat-box{
margin-top:30px;
}

.chat-box h2{
margin-bottom:15px;
color:cyan;
}

#question{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#111827;
color:white;
font-size:16px;
}

button{
margin-top:15px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:cyan;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

#response{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:12px;
min-height:80px;
line-height:1.6;
color:#ddd;
}

.footer{
margin-top:30px;
text-align:center;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="profile">

<img src="https://i.imgur.com/8Km9tLL.png">

<h1>Halo, Saya <span>Frendi AI</span> 👋</h1>

<p>
Freelance Developer | Learning AI & Web Development
</p>

</div>

<div class="skills">

<div class="skill">HTML</div>
<div class="skill">CSS</div>
<div class="skill">JavaScript</div>
<div class="skill">Artificial Intelligence</div>

</div>

<div class="chat-box">

<h2>🤖 Tanya AI Saya</h2>

<input type="text" id="question" placeholder="Tanya sesuatu...">

<button onclick="askAI()">
Kirim Pertanyaan
</button>

<div id="response">
Jawaban AI akan muncul di sini...
</div>

</div>

<div class="footer">
© 2024 Frendi AI Portfolio
</div>

</div>

<script>

async function askAI(){

const question = document.getElementById("question").value;

const responseDiv = document.getElementById("response");

responseDiv.innerHTML = "AI sedang berpikir...";

const apiKey = "AIzaSyBLpPDKoC2aVnIHo0sQCEKD4r-OrHY9XzU";

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:question
}
]
}
]
})
}
);

const data = await response.json();

console.log(data);

if(data.candidates){
responseDiv.innerHTML =
data.candidates[0].content.parts[0].text;
}else{
responseDiv.innerHTML =
"Error: " + JSON.stringify(data);
}

}

</script>

</body>
</html>
